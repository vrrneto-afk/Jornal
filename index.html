<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornal Litúrgico A3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toolbar">
<input type="file" id="imgUpload">
<button onclick="window.print()">Exportar PDF</button>
</div>

<div class="sheet">

<section class="page page4">
<div class="cols">
<div class="editable box" contenteditable="true">CONTRACAPA</div>
<div class="editable box" contenteditable="true">AVISOS</div>
<div class="editable box" contenteditable="true">EXPEDIENTE / QR CODE</div>
</div>
</section>

<section class="page page1">
<header class="header">
<div contenteditable="true">LOGO</div>
<div>
<h1 contenteditable="true">NOME DO JORNAL</h1>
<h3 contenteditable="true">Subtítulo</h3>
</div>
<div contenteditable="true">LOGO</div>
</header>

<h2 class="titulo" contenteditable="true">TÍTULO PRINCIPAL</h2>

<div class="cols">
<div class="editable box" contenteditable="true">COLUNA 1</div>
<div class="editable box" contenteditable="true">COLUNA 2</div>
<div class="box">
<img id="foto" src="" alt="imagem">
<div class="editable" contenteditable="true">COLUNA 3</div>
</div>
</div>
</section>

</div>

<div class="sheet">

<section class="page page2">
<div class="cols">
<div class="editable box" contenteditable="true">PÁGINA 2 - COLUNA 1</div>
<div class="editable box" contenteditable="true">PÁGINA 2 - COLUNA 2</div>
<div class="editable box" contenteditable="true">PÁGINA 2 - COLUNA 3</div>
</div>
</section>

<section class="page page3">
<div class="cols">
<div class="editable box" contenteditable="true">PÁGINA 3 - COLUNA 1</div>
<div class="editable box" contenteditable="true">PÁGINA 3 - COLUNA 2</div>
<div class="editable box" contenteditable="true">PÁGINA 3 - COLUNA 3</div>
</div>
</section>

</div>

<script src="editor.js"></script>
</body>
</html>
